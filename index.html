<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>revoltts</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --panel: #ffffff;
        --panel-soft: #f1f4f8;
        --text: #18202c;
        --muted: #667085;
        --line: #d9e0ea;
        --accent: #0f766e;
        --accent-strong: #115e59;
        --danger: #b42318;
        --shadow: 0 18px 45px rgba(20, 30, 45, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      main {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 28px 0 40px;
      }

      header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 18px;
        margin-bottom: 20px;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.15;
        font-weight: 760;
      }

      .subtitle {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 14px;
      }

      .status {
        min-height: 38px;
        padding: 10px 13px;
        border: 1px solid var(--line);
        background: var(--panel);
        border-radius: 8px;
        color: var(--muted);
        font-size: 14px;
      }

      .status.error {
        border-color: #fecdca;
        background: #fff4f3;
        color: var(--danger);
      }

      .status.ok {
        border-color: #a7f3d0;
        background: #ecfdf3;
        color: #067647;
      }

      .grid {
        display: grid;
        grid-template-columns: minmax(0, 1.08fr) minmax(330px, 0.72fr);
        gap: 18px;
        align-items: start;
      }

      section,
      aside {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
      }

      .section-body {
        padding: 18px;
      }

      .section-title {
        padding: 15px 18px;
        border-bottom: 1px solid var(--line);
        font-weight: 700;
      }

      .field {
        display: grid;
        gap: 7px;
        margin-bottom: 15px;
      }

      .row {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      label {
        color: #344054;
        font-size: 13px;
        font-weight: 650;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        background: #fff;
        color: var(--text);
        border-radius: 8px;
        font: inherit;
        font-size: 14px;
        outline: none;
        transition:
          border-color 0.15s ease,
          box-shadow 0.15s ease;
      }

      input,
      select {
        height: 40px;
        padding: 0 11px;
      }

      textarea {
        min-height: 128px;
        resize: vertical;
        padding: 11px;
        line-height: 1.55;
      }

      input:focus,
      select:focus,
      textarea:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.12);
      }

      .upload-zone {
        display: grid;
        gap: 11px;
        padding: 14px;
        border: 1px dashed #b7c4d4;
        border-radius: 8px;
        background: var(--panel-soft);
      }

      .record-controls {
        display: flex;
        flex-wrap: wrap;
        gap: 9px;
      }

      button {
        height: 40px;
        border: 1px solid transparent;
        border-radius: 8px;
        padding: 0 14px;
        font: inherit;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
      }

      button.primary {
        width: 100%;
        height: 46px;
        background: var(--accent);
        color: #fff;
      }

      button.primary:hover {
        background: var(--accent-strong);
      }

      button.secondary {
        background: #fff;
        border-color: var(--line);
        color: #344054;
      }

      button.danger {
        background: #fff1f0;
        border-color: #fecdca;
        color: var(--danger);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.58;
      }

      .inline {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .inline input {
        width: 16px;
        height: 16px;
      }

      audio {
        width: 100%;
      }

      .result {
        display: grid;
        gap: 13px;
      }

      .download {
        display: none;
        height: 40px;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        background: #e6fffb;
        color: var(--accent-strong);
        font-weight: 750;
        text-decoration: none;
      }

      .download.ready {
        display: flex;
      }

      .meta {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      @media (max-width: 860px) {
        header {
          align-items: stretch;
          flex-direction: column;
        }

        .grid,
        .row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>revoltts</h1>
          <p class="subtitle">Fish Speech 克隆音色 TTS 调试页面</p>
        </div>
        <div id="status" class="status">待提交</div>
      </header>

      <div class="grid">
        <section>
          <div class="section-title">请求配置</div>
          <div class="section-body">
            <form id="ttsForm">
              <div class="field">
                <label for="endpoint">/ttsform 请求地址</label>
                <input id="endpoint" name="endpoint" type="url" required />
              </div>

              <div class="field">
                <label for="text">合成文本 text</label>
                <textarea
                  id="text"
                  name="text"
                  required
                  placeholder="输入要合成的文本"
                ></textarea>
              </div>

              <div class="field">
                <label for="referenceText">参考音频文本 reference_text</label>
                <textarea
                  id="referenceText"
                  name="reference_text"
                  required
                  placeholder="输入参考音频中对应的原文"
                ></textarea>
              </div>

              <div class="field">
                <label>参考音频 reference_audio</label>
                <div class="upload-zone">
                  <input
                    id="referenceAudio"
                    name="reference_audio"
                    type="file"
                    accept="audio/*"
                  />
                  <div class="record-controls">
                    <button id="recordButton" class="secondary" type="button">
                      开始录制
                    </button>
                    <button id="stopButton" class="danger" type="button" disabled>
                      停止录制
                    </button>
                    <button id="clearRecording" class="secondary" type="button" disabled>
                      清除录音
                    </button>
                  </div>
                  <audio id="recordPreview" controls></audio>
                  <div id="audioMeta" class="meta">请选择音频文件，或直接录制一段参考音频。</div>
                </div>
              </div>

              <div class="row">
                <div class="field">
                  <label for="format">输出格式 format</label>
                  <select id="format" name="format">
                    <option value="wav" selected>wav</option>
                    <option value="mp3">mp3</option>
                    <option value="opus">opus</option>
                    <option value="pcm">pcm</option>
                  </select>
                </div>
                <div class="field">
                  <label for="filename">下载文件名 filename</label>
                  <input id="filename" name="filename" value="revoltts-output" />
                </div>
              </div>

              <div class="row">
                <div class="field">
                  <label for="chunkLength">chunk_length</label>
                  <input id="chunkLength" name="chunk_length" type="number" min="100" max="1000" value="200" />
                </div>
                <div class="field">
                  <label for="maxNewTokens">max_new_tokens</label>
                  <input id="maxNewTokens" name="max_new_tokens" type="number" min="0" value="1024" />
                </div>
              </div>

              <div class="row">
                <div class="field">
                  <label for="topP">top_p</label>
                  <input id="topP" name="top_p" type="number" min="0.1" max="1" step="0.05" value="0.8" />
                </div>
                <div class="field">
                  <label for="temperature">temperature</label>
                  <input id="temperature" name="temperature" type="number" min="0.1" max="1" step="0.05" value="0.8" />
                </div>
              </div>

              <div class="row">
                <div class="field">
                  <label for="repetitionPenalty">repetition_penalty</label>
                  <input id="repetitionPenalty" name="repetition_penalty" type="number" min="0.9" max="2" step="0.05" value="1.1" />
                </div>
                <div class="field">
                  <label for="seed">seed</label>
                  <input id="seed" name="seed" type="number" placeholder="留空为随机" />
                </div>
              </div>

              <div class="row">
                <label class="inline">
                  <input id="normalize" name="normalize" type="checkbox" checked />
                  normalize
                </label>
                <label class="inline">
                  <input id="useMemoryCache" name="use_memory_cache" type="checkbox" />
                  use_memory_cache
                </label>
              </div>

              <button id="submitButton" class="primary" type="submit">生成音频</button>
            </form>
          </div>
        </section>

        <aside>
          <div class="section-title">生成结果</div>
          <div class="section-body result">
            <audio id="resultAudio" controls></audio>
            <a id="downloadLink" class="download" download>下载音频</a>
            <div id="resultMeta" class="meta">
              提交后会在这里显示生成耗时、返回大小和音频播放控件。
            </div>
          </div>
        </aside>
      </div>
    </main>

    <script>
      const endpointInput = document.querySelector("#endpoint");
      const form = document.querySelector("#ttsForm");
      const statusEl = document.querySelector("#status");
      const submitButton = document.querySelector("#submitButton");
      const fileInput = document.querySelector("#referenceAudio");
      const recordButton = document.querySelector("#recordButton");
      const stopButton = document.querySelector("#stopButton");
      const clearRecordingButton = document.querySelector("#clearRecording");
      const recordPreview = document.querySelector("#recordPreview");
      const audioMeta = document.querySelector("#audioMeta");
      const resultAudio = document.querySelector("#resultAudio");
      const downloadLink = document.querySelector("#downloadLink");
      const resultMeta = document.querySelector("#resultMeta");

      let mediaRecorder = null;
      let recordedChunks = [];
      let recordedBlob = null;
      let recordUrl = null;
      let resultUrl = null;

      function defaultEndpoint() {
        if (location.protocol === "http:" || location.protocol === "https:") {
          return `${location.origin}/ttsform`;
        }
        return "http://127.0.0.1:8081/ttsform";
      }

      endpointInput.value = defaultEndpoint();

      function setStatus(message, type = "") {
        statusEl.textContent = message;
        statusEl.className = `status ${type}`.trim();
      }

      function revokeUrl(url) {
        if (url) {
          URL.revokeObjectURL(url);
        }
      }

      function currentReferenceAudio() {
        if (recordedBlob) {
          return new File([recordedBlob], "recorded-reference.webm", {
            type: recordedBlob.type || "audio/webm",
          });
        }

        const file = fileInput.files && fileInput.files[0];
        return file || null;
      }

      fileInput.addEventListener("change", () => {
        const file = fileInput.files && fileInput.files[0];
        if (file) {
          recordedBlob = null;
          revokeUrl(recordUrl);
          recordUrl = null;
          recordPreview.removeAttribute("src");
          recordPreview.load();
          clearRecordingButton.disabled = true;
          audioMeta.textContent = `已选择文件：${file.name}，${Math.ceil(file.size / 1024)} KB`;
        }
      });

      recordButton.addEventListener("click", async () => {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          recordedChunks = [];
          mediaRecorder = new MediaRecorder(stream);

          mediaRecorder.addEventListener("dataavailable", (event) => {
            if (event.data.size > 0) {
              recordedChunks.push(event.data);
            }
          });

          mediaRecorder.addEventListener("stop", () => {
            stream.getTracks().forEach((track) => track.stop());
            recordedBlob = new Blob(recordedChunks, {
              type: mediaRecorder.mimeType || "audio/webm",
            });
            revokeUrl(recordUrl);
            recordUrl = URL.createObjectURL(recordedBlob);
            recordPreview.src = recordUrl;
            fileInput.value = "";
            clearRecordingButton.disabled = false;
            audioMeta.textContent = `已录制参考音频：${Math.ceil(recordedBlob.size / 1024)} KB`;
          });

          mediaRecorder.start();
          recordButton.disabled = true;
          stopButton.disabled = false;
          setStatus("正在录制参考音频");
        } catch (error) {
          setStatus(`无法开始录音：${error.message}`, "error");
        }
      });

      stopButton.addEventListener("click", () => {
        if (mediaRecorder && mediaRecorder.state !== "inactive") {
          mediaRecorder.stop();
          recordButton.disabled = false;
          stopButton.disabled = true;
          setStatus("录音已完成", "ok");
        }
      });

      clearRecordingButton.addEventListener("click", () => {
        recordedBlob = null;
        recordedChunks = [];
        revokeUrl(recordUrl);
        recordUrl = null;
        recordPreview.removeAttribute("src");
        recordPreview.load();
        clearRecordingButton.disabled = true;
        audioMeta.textContent = "请选择音频文件，或直接录制一段参考音频。";
      });

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const referenceAudio = currentReferenceAudio();
        if (!referenceAudio) {
          setStatus("请上传或录制参考音频", "error");
          return;
        }

        const startedAt = performance.now();
        const formData = new FormData();
        const format = document.querySelector("#format").value;
        const filename = document.querySelector("#filename").value.trim();
        const seed = document.querySelector("#seed").value.trim();

        formData.append("text", document.querySelector("#text").value);
        formData.append("reference_text", document.querySelector("#referenceText").value);
        formData.append("reference_audio", referenceAudio);
        formData.append("format", format);
        formData.append("chunk_length", document.querySelector("#chunkLength").value);
        formData.append("max_new_tokens", document.querySelector("#maxNewTokens").value);
        formData.append("top_p", document.querySelector("#topP").value);
        formData.append("repetition_penalty", document.querySelector("#repetitionPenalty").value);
        formData.append("temperature", document.querySelector("#temperature").value);
        formData.append("normalize", document.querySelector("#normalize").checked ? "true" : "false");
        formData.append("use_memory_cache", document.querySelector("#useMemoryCache").checked ? "on" : "off");
        if (seed) {
          formData.append("seed", seed);
        }
        if (filename) {
          formData.append("filename", filename);
        }

        revokeUrl(resultUrl);
        resultUrl = null;
        downloadLink.classList.remove("ready");
        resultAudio.removeAttribute("src");
        resultAudio.load();
        submitButton.disabled = true;
        setStatus("正在请求 TTS 服务");
        resultMeta.textContent = "生成中...";

        try {
          const response = await fetch(endpointInput.value, {
            method: "POST",
            body: formData,
          });

          if (!response.ok) {
            const text = await response.text();
            throw new Error(text || `HTTP ${response.status}`);
          }

          const blob = await response.blob();
          resultUrl = URL.createObjectURL(blob);
          resultAudio.src = resultUrl;
          downloadLink.href = resultUrl;
          downloadLink.download = filename
            ? filename.endsWith(`.${format}`) ? filename : `${filename}.${format}`
            : `revoltts-output.${format}`;
          downloadLink.classList.add("ready");

          const elapsed = Math.round(performance.now() - startedAt);
          resultMeta.textContent = `生成完成：${elapsed} ms，${Math.ceil(blob.size / 1024)} KB`;
          setStatus("生成完成", "ok");
        } catch (error) {
          resultMeta.textContent = "生成失败";
          setStatus(`生成失败：${error.message}`, "error");
        } finally {
          submitButton.disabled = false;
        }
      });
    </script>
  </body>
</html>
